<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Video Grid Reviewer</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f172a;
      --fg:#e5e7eb;
      --muted:#94a3b8;
      --accent:#7aa2f7;
      --danger:#ef4444;
      --gap:10px;
      --radius:14px;
      --shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:linear-gradient(180deg, #0b0f14 0%, #0a0e13 60%, #0b0f14 100%);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
      overflow:hidden;
    }
    .toolbar{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding:12px 16px;
      background:rgba(15,23,42,.7);
      backdrop-filter: blur(8px) saturate(140%);
      border-bottom:1px solid rgba(148,163,184,.15);
    }
    .spacer{ flex:1; }
    .count{ color:var(--muted); font-size:14px; }
    .active-collection-name{
      color:#7aa2f7;
      font-size:15px;
      font-weight:700;
      letter-spacing:.03em;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 0 18px rgba(122,162,247,.22);
    }
    .hint{ color:var(--muted); font-size:12px; }
    button{
      appearance:none; border:0; cursor:pointer;
      padding:10px 14px; border-radius:12px;
      background:linear-gradient(180deg, #1e293b, #111827);
      color:#e5e7eb; font-weight:600; letter-spacing:.2px;
      box-shadow: var(--shadow);
    }
    button:hover{ filter:brightness(1.05); }
    button:active{ transform:translateY(1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; }
    .btn-primary{ background:linear-gradient(180deg, #2a4b9e, #1f2b6b); }
    .order-menu{
      position:relative;
      display:inline-flex;
      align-items:center;
    }
    .order-menu-panel{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      min-width:190px;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:8px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(2,6,23,.95);
      box-shadow: var(--shadow);
      max-height:0;
      opacity:0;
      overflow:hidden;
      pointer-events:none;
      transform: translateY(-8px);
      transition: max-height .18s ease, opacity .14s ease, transform .18s ease;
      z-index:30;
    }
    .order-menu-panel button{
      width:100%;
      text-align:left;
      padding:8px 10px;
      border-radius:8px;
      box-shadow:none;
    }
    .order-menu-panel button:disabled{ opacity:.5; }
    .order-menu[data-open="true"] .order-menu-panel{
      max-height:180px;
      opacity:1;
      pointer-events:auto;
      transform: translateY(0);
    }
    .visually-hidden{ position:fixed; left:-9999px; width:1px; height:1px; opacity:0; pointer-events:none; }

    .collection-conflict,
    .save-as-new-dialog{
      margin:12px 16px 0;
      padding:14px 16px;
      border-radius:12px;
      box-shadow: var(--shadow);
    }
    .collection-conflict{
      border:1px solid rgba(239,68,68,.45);
      background:rgba(69,10,10,.45);
    }
    .collection-conflict p{
      margin:0 0 10px;
      color:#fecaca;
    }
    .collection-conflict pre{
      margin:0 0 12px;
      padding:10px 12px;
      border-radius:10px;
      background:rgba(2,6,23,.45);
      color:#fca5a5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space:pre-wrap;
      max-height:180px;
      overflow:auto;
    }
    .collection-conflict-actions,
    .save-as-new-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .save-as-new-dialog{
      border:1px solid rgba(122,162,247,.35);
      background:rgba(15,23,42,.92);
      max-width:520px;
    }
    .save-as-new-dialog h2{
      margin:0 0 8px;
      font-size:18px;
    }
    .save-as-new-dialog p{
      margin:0 0 12px;
      color:var(--muted);
    }
    .save-as-new-dialog label{
      display:block;
      margin-bottom:10px;
      color:#dbeafe;
      font-size:14px;
    }
    .save-as-new-dialog input{
      width:100%;
      margin-top:6px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(2,6,23,.85);
      color:var(--fg);
      font:inherit;
    }
    .save-as-new-error{
      min-height:20px;
      margin:0 0 12px;
      color:#fca5a5;
      font-size:13px;
    }

    #gridWrap{
      height: calc(100vh - 60px);
      padding:14px; overflow:auto;
    }
    #grid{
      display:grid; grid-auto-flow:dense;
      gap:var(--gap);
      grid-template-columns: repeat(1, 1fr);
      align-content:start;
    }
    .thumb{
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(180deg, #0f172a, #0b1222);
      border:1px solid rgba(148,163,184,.16);
      border-radius:var(--radius);
      position:relative;
      overflow:hidden;
      user-select:none;
      box-shadow: var(--shadow);
    }
    .thumb.selected{ box-shadow: 0 0 0 3px rgba(122,162,247,.65), var(--shadow); }
    .thumb.dragging{ opacity:.65; }
    .thumb.drag-over::after{ content:""; position:absolute; inset:0; border:2px dashed var(--accent); border-radius:var(--radius); pointer-events:none; }
    video{ max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; background:black; display:block; border-radius: 10px; }
    .filename{ position:absolute; left:0; right:0; bottom:0; font-size:12px; line-height:1.3; color:#d1d5db; padding:6px 8px; background:linear-gradient(180deg, rgba(2,6,23,0), rgba(2,6,23,.75)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .titles-hidden .filename{ display:none; }

    .fs-active .toolbar{ display:none; }
    .fs-active #gridWrap{ height:100vh; padding:14px; display:block; }
    .fs-active .collection-conflict,
    .fs-active .save-as-new-dialog{ display:none !important; }

    .fs-active .thumb{ background:#000 !important; border:none !important; box-shadow:none !important; }
    .fs-active .thumb.selected{ box-shadow:none !important; }
    .fs-active .thumb.drag-over::after{ display:none !important; }

    .footerbar{ position:fixed; right:16px; bottom:16px; z-index:5; background:rgba(2,6,23,.72); border:1px solid rgba(148,163,184,.2); padding:8px 12px; border-radius:10px; color:var(--muted); font-size:12px; }

    @media (min-width: 901px) {
      .toolbar{ position:sticky; }
      .active-collection-name{
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        max-width:min(42vw, 420px);
        pointer-events:none;
      }
    }

    @media (max-width: 900px) {
      .active-collection-name{
        order:20;
        flex-basis:100%;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <header class="toolbar" id="toolbar">
    <button id="pickBtn" class="btn-primary">Browse Folder…</button>
    <input type="file" id="folderInput" class="visually-hidden" webkitdirectory directory multiple tabindex="-1" aria-hidden="true" />
    <input type="file" id="orderFileInput" class="visually-hidden" accept=".txt,text/plain" tabindex="-1" aria-hidden="true" />
    <div class="order-menu" id="orderMenu" data-open="false">
      <button id="orderMenuBtn" aria-haspopup="menu" aria-expanded="false" aria-controls="orderMenuPanel">Collection</button>
      <div class="order-menu-panel" id="orderMenuPanel" role="menu" aria-label="Collection actions">
        <button id="loadOrderBtn" role="menuitem" title="Load a collection file (folder must already be loaded)">Load</button>
        <button id="saveBtn" role="menuitem" title="Save default-collection.txt in the chosen folder (or download if permissions are unavailable)" disabled>Save</button>
        <button id="saveAsNewBtn" role="menuitem" title="Save the current collection to a new file" disabled>Save as New</button>
      </div>
    </div>
    <button id="toggleTitlesBtn" title="Hide or show clip titles">Hide Titles</button>
    <button id="fsBtn" title="Full screen (hides titles)">Full Screen</button>
    <span class="active-collection-name" id="activeCollectionName">Local Video Grid Reviewer</span>
    <div class="spacer"></div>
    <span class="count" id="count">0 clips</span>
    <span class="hint">drag to reorder • click to select • press Delete to remove • press F for fullscreen</span>
  </header>

  <section class="collection-conflict" id="collectionConflict" hidden aria-live="polite">
    <p id="collectionConflictSummary"></p>
    <pre id="collectionConflictList"></pre>
    <div class="collection-conflict-actions">
      <button id="applyCollectionConflictBtn" type="button">Display Existing Clips Only</button>
      <button id="cancelCollectionConflictBtn" type="button">Cancel</button>
    </div>
  </section>

  <section class="save-as-new-dialog" id="saveAsNewDialog" hidden aria-live="polite">
    <h2>Save current collection as a new file</h2>
    <p>Enter a file name. The app will add .txt automatically.</p>
    <label for="saveAsNewNameInput">
      Collection name
      <input id="saveAsNewNameInput" type="text" autocomplete="off" spellcheck="false" />
    </label>
    <div class="save-as-new-error" id="saveAsNewError"></div>
    <div class="save-as-new-actions">
      <button id="confirmSaveAsNewBtn" type="button">Save New</button>
      <button id="cancelSaveAsNewBtn" type="button">Cancel</button>
    </div>
  </section>

  <div id="gridWrap">
    <div id="grid" aria-live="polite"></div>
  </div>

  <div class="footerbar" id="status" hidden></div>
  <script type="module">
    import { initApp } from './app.js';
    initApp();
  </script>
</body>
</html>
